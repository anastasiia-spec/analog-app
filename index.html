<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="AnaLog"/>
  <meta name="theme-color" content="#F4F1E8"/>
  <title>AnaLog</title>
</head>
<body style="margin:0;background:#F4F1E8">
  <div id="root"></div>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Recharts -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.9.0/Recharts.js"></script>
  <!-- Babel standalone to compile JSX -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = Recharts;


const ACTIVITIES = [
  { id:"run",      label:"Run",      icon:"🏃", accent:"#E8E44A", fields:["distance","duration","elevation"] },
  { id:"ride",     label:"Ride",     icon:"🚴", accent:"#C8F5A0", fields:["distance","duration","elevation"] },
  { id:"swim",     label:"Swim",     icon:"🏊", accent:"#A0D8F5", fields:["distance","duration","laps"] },
  { id:"hike",     label:"Hike",     icon:"🥾", accent:"#D4EDB0", fields:["distance","duration","elevation"] },
  { id:"yoga",     label:"Yoga",     icon:"🧘", accent:"#F5CDF0", fields:["duration","feel"] },
  { id:"meditate", label:"Meditate", icon:"✦",  accent:"#C8B8F0", fields:["duration","feel"] },
  { id:"gym",      label:"Gym",      icon:"💪", accent:"#F5E0A0", fields:["duration","sets"] },
  { id:"walk",     label:"Walk",     icon:"🚶", accent:"#B0F0D8", fields:["distance","duration","steps"] },
  { id:"ski",      label:"Ski",      icon:"⛷️", accent:"#B0D8F5", fields:["duration","runs","elevation"] },
  { id:"climb",    label:"Climb",    icon:"🧗", accent:"#F5C8A0", fields:["duration","routes"] },
  { id:"tennis",   label:"Tennis",   icon:"🎾", accent:"#E8E44A", fields:["duration","sets"] },
  { id:"surf",     label:"Surf",     icon:"🏄", accent:"#A0EEF5", fields:["duration","feel"] },
  { id:"dance",    label:"Dance",    icon:"💃", accent:"#F5A0C8", fields:["duration","feel"] },
  { id:"other",    label:"Other",    icon:"◎",  accent:"#E0DCCF", fields:["duration"] },
];

const FIELD_META = {
  distance:  { label:"Distance",    unit:"km",  ph:"0.0", type:"number" },
  duration:  { label:"Duration",    unit:"min", ph:"0",   type:"number" },
  elevation: { label:"Elevation",   unit:"m",   ph:"0",   type:"number" },
  laps:      { label:"Laps",        unit:"",    ph:"0",   type:"number" },
  steps:     { label:"Steps",       unit:"",    ph:"0",   type:"number" },
  sets:      { label:"Sets",        unit:"",    ph:"0",   type:"number" },
  runs:      { label:"Runs",        unit:"",    ph:"0",   type:"number" },
  routes:    { label:"Routes",      unit:"",    ph:"0",   type:"number" },
  feel:      { label:"How it felt", unit:"",    ph:"Peaceful, energising, tough…", type:"text" },
};
const FIELD_ICON = { distance:"→", duration:"◷", elevation:"△", laps:"↻", steps:"⋯", sets:"▣", runs:"◈", routes:"◎", feel:"✦" };

const MONTHS   = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_S = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_S   = ["S","M","T","W","T","F","S"];

const getAct   = (id) => ACTIVITIES.find(a => a.id === id) || ACTIVITIES[ACTIVITIES.length-1];
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const fmtDate  = (ds) => {
  const d=new Date(ds+"T00:00:00"), t=todayStr();
  const yest=new Date(); yest.setDate(yest.getDate()-1);
  const ys=`${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,"0")}-${String(yest.getDate()).padStart(2,"0")}`;
  if(ds===t) return "Today";
  if(ds===ys) return "Yesterday";
  return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
};

/* ── STORAGE — uses localStorage for real deployment ── */
const storage = {
  get: (key) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch{ return null; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch{} },
};

function App() {
  const [view,setView]           = useState("home");
  const [acts,setActs]           = useState([]);
  const [showLog,setShowLog]     = useState(false);
  const [editEntry,setEditEntry] = useState(null);
  const [calDate,setCalDate]     = useState(new Date());
  const [selDay,setSelDay]       = useState(null);
  const [gcal,setGcal]           = useState("");

  useEffect(()=>{
    const saved = storage.get("analog-v1");
    if(saved) setActs(saved);
  },[]);

  useEffect(()=>{ storage.set("analog-v1", acts); },[acts]);

  const save=(e)=>{
    if(e.id) setActs(p=>p.map(a=>a.id===e.id?e:a));
    else setActs(p=>[{...e,id:Date.now().toString()},...p]);
    setShowLog(false); setEditEntry(null);
  };
  const del=(id)=>setActs(p=>p.filter(a=>a.id!==id));
  const openLog=(entry=null)=>{ setEditEntry(entry); setShowLog(true); };

  const exportICS=()=>{
    setGcal("syncing");
    const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//AnaLog//EN","CALSCALE:GREGORIAN","X-WR-CALNAME:AnaLog Activities"];
    acts.forEach(a=>{
      const act=getAct(a.type),d=a.date.replace(/-/g,"");
      const desc=Object.entries(a.fields||{}).filter(([,v])=>v)
        .map(([k,v])=>{ const f=FIELD_META[k]; return f?`${f.label}: ${v}${f.unit?" "+f.unit:""}`:null; }).filter(Boolean).join("\\n");
      lines.push("BEGIN:VEVENT",`UID:${a.id}@analog`,`DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,
        `SUMMARY:${act.icon} ${act.label}${a.title?" – "+a.title:""}`,
        ...(desc?[`DESCRIPTION:${desc}`]:[]),...(a.notes?[`COMMENT:${a.notes}`]:[]),"END:VEVENT");
    });
    lines.push("END:VCALENDAR");
    const url=URL.createObjectURL(new Blob([lines.join("\r\n")],{type:"text/calendar"}));
    Object.assign(document.createElement("a"),{href:url,download:"analog.ics"}).click();
    URL.revokeObjectURL(url);
    setTimeout(()=>setGcal("done"),700);
    setTimeout(()=>setGcal(""),4500);
  };

  const isApp = view!=="home";

  return (
    <div className="app">
      <style>{CSS}</style>

      {isApp && (
        <header className="hdr">
          <div className="hdr-inner">
            <button className="logo" onClick={()=>setView("home")}>
              <span className="logo-mark">◈</span>
              <span className="logo-name">AnaLog</span>
            </button>
            <nav className="top-nav d-show">
              {[["feed","Activity"],["calendar","Calendar"],["stats","Stats"]].map(([v,l])=>(
                <button key={v} className={`tnav${view===v?" on":""}`} onClick={()=>setView(v)}>{l}</button>
              ))}
            </nav>
            <button className="pill-btn d-show" onClick={()=>openLog()}>+ Log activity</button>
            <button className="hdr-plus m-show" onClick={()=>openLog()}>+</button>
          </div>
        </header>
      )}

      <main className={isApp?"main":""}>
        {view==="home"     && <LandingView onStart={()=>setView("feed")} />}
        {view==="feed"     && <FeedView acts={acts} onEdit={openLog} onDel={del} onLog={()=>openLog()} />}
        {view==="calendar" && <CalView acts={acts} calDate={calDate} setCalDate={setCalDate} selDay={selDay} setSelDay={setSelDay} onExport={exportICS} gcal={gcal} onLog={d=>openLog({date:d})} onEdit={openLog} onDel={del} />}
        {view==="stats"    && <StatsView acts={acts} />}
      </main>

      <nav className="tab-bar m-show">
        <button className={`tab-btn${view==="home"?" on":""}`} onClick={()=>setView("home")}>
          <span className="tab-ic">◈</span><span className="tab-lbl">Home</span>
        </button>
        {[["feed","🏃","Move"],["calendar","📅","Calendar"],["stats","📊","Stats"]].map(([v,ic,l])=>(
          <button key={v} className={`tab-btn${view===v?" on":""}`} onClick={()=>setView(v)}>
            <span className="tab-ic">{ic}</span><span className="tab-lbl">{l}</span>
          </button>
        ))}
        <button className="tab-btn tab-log" onClick={()=>openLog()}>
          <span className="tab-ic">✦</span><span className="tab-lbl">Log</span>
        </button>
      </nav>

      {isApp && view==="feed" && <button className="fab d-show" onClick={()=>openLog()}>+</button>}
      {showLog && <LogModal entry={editEntry} onSave={save} onClose={()=>{setShowLog(false);setEditEntry(null);}} />}
    </div>
  );
}

/* ── LANDING ── */
function LandingView({ onStart }) {
  const features = [
    { icon:"🏃", title:"Any activity",   desc:"Run, swim, meditate, dance — log anything without timers or GPS." },
    { icon:"📅", title:"Calendar view",  desc:"See your entire movement history at a glance. Every active day marked." },
    { icon:"📊", title:"Simple stats",   desc:"Monthly and yearly breakdowns. No streaks, no pressure." },
    { icon:"✦",  title:"No obligations", desc:"No daily goals. No notifications. Just a beautiful record of you." },
  ];
  return (
    <div className="landing">
      <section className="l-hero">
        <div className="l-hero-inner">
          <div className="l-logo-row">
            <span className="l-logo-mark">◈</span>
            <span className="l-logo-name">AnaLog</span>
          </div>
          <div className="l-hero-orb" />
          <h1 className="l-hero-h">Track how<br/>active you are.</h1>
          <p className="l-hero-sub">No timers. No streaks. No pressure.<br/>Just log what you did — and see your life in motion.</p>
          <div className="l-hero-btns">
            <button className="pill-btn big" onClick={onStart}>Get started →</button>
            <div className="l-activity-pills">
              {ACTIVITIES.slice(0,8).map(a=>(
                <span key={a.id} className="l-act-pill" style={{background:a.accent+"33",borderColor:a.accent+"66"}}>{a.icon} {a.label}</span>
              ))}
            </div>
          </div>
        </div>
      </section>

      <div className="l-band">
        <div className="l-band-track">
          {[...ACTIVITIES,...ACTIVITIES].map((a,i)=>(
            <span key={i} className="l-band-item">{a.icon} {a.label}</span>
          ))}
        </div>
      </div>

      <section className="l-section">
        <div className="l-section-inner">
          <p className="l-eyebrow">Why AnaLog</p>
          <h2 className="l-section-h">Movement without the pressure.</h2>
          <div className="l-features">
            {features.map((f,i)=>(
              <div key={i} className="l-feat-card">
                <div className="l-feat-icon">{f.icon}</div>
                <h3 className="l-feat-title">{f.title}</h3>
                <p className="l-feat-desc">{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="l-section l-alt">
        <div className="l-section-inner">
          <p className="l-eyebrow">How it works</p>
          <h2 className="l-section-h">Three steps.<br/>That's it.</h2>
          <div className="l-steps">
            {[
              { n:"01", t:"Pick an activity", d:"Choose from running, yoga, meditation, climbing, surfing — or anything else." },
              { n:"02", t:"Add optional details", d:"Distance, duration, how it felt. All optional. Log takes under 10 seconds." },
              { n:"03", t:"See your pattern", d:"Calendar dots show your active days. Stats reveal your rhythm over time." },
            ].map((s,i)=>(
              <div key={i} className="l-step">
                <span className="l-step-n">{s.n}</span>
                <div><h3 className="l-step-t">{s.t}</h3><p className="l-step-d">{s.d}</p></div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="l-section">
        <div className="l-section-inner">
          <p className="l-eyebrow">14 activities</p>
          <h2 className="l-section-h">Everything you do,<br/>tracked your way.</h2>
          <div className="l-act-grid">
            {ACTIVITIES.map(a=>(
              <div key={a.id} className="l-act-card" style={{background:a.accent+"22",borderColor:a.accent+"55"}}>
                <span className="l-act-card-icon">{a.icon}</span>
                <span className="l-act-card-name">{a.label}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="l-cta">
        <div className="l-cta-inner">
          <div className="l-cta-orb" />
          <h2 className="l-cta-h">Ready to start<br/>moving?</h2>
          <p className="l-cta-sub">Free. Private. No account needed.</p>
          <button className="pill-btn big" onClick={onStart}>Open AnaLog →</button>
        </div>
      </section>

      <footer className="l-footer">
        <div className="l-footer-inner">
          <div className="l-footer-logo"><span className="logo-mark">◈</span><span className="logo-name">AnaLog</span></div>
          <p className="l-footer-copy">Track how active you are. No pressure, no streaks.</p>
          <p className="l-footer-tiny">© 2026 AnaLog · All data stays on your device</p>
        </div>
      </footer>
    </div>
  );
}

/* ── FEED ── */
function FeedView({ acts, onEdit, onDel, onLog }) {
  const sorted=[...acts].sort((a,b)=>b.date.localeCompare(a.date));
  const grouped={};
  sorted.forEach(a=>{ if(!grouped[a.date]) grouped[a.date]=[]; grouped[a.date].push(a); });
  if(!sorted.length) return (
    <div className="empty-wrap">
      <div className="empty-orb"/>
      <h2 className="empty-h">Start moving.</h2>
      <p className="empty-p">No timers. No pressure.<br/>Just log what you did today.</p>
      <button className="pill-btn big" onClick={onLog}>Log your first activity</button>
    </div>
  );
  return (
    <div className="feed">
      {Object.entries(grouped).map(([date,entries])=>(
        <div key={date} className="day-block fade-up">
          <p className="day-heading">{fmtDate(date)}</p>
          {entries.map(e=><Card key={e.id} e={e} onEdit={onEdit} onDel={onDel}/>)}
        </div>
      ))}
    </div>
  );
}

function Card({ e, onEdit, onDel }) {
  const act=getAct(e.type);
  const [conf,setConf]=useState(false);
  const meta=Object.entries(e.fields||{}).filter(([,v])=>v&&v!=="");
  return (
    <div className="card" style={{"--acc":act.accent}}>
      <div className="card-left">
        <div className="card-badge">{act.icon}</div>
        <div className="card-content">
          <div className="card-type">{act.label}</div>
          {e.title&&<div className="card-title">{e.title}</div>}
          {(meta.length>0||e.notes)&&(
            <div className="card-chips">
              {meta.map(([k,v])=>{ const f=FIELD_META[k]; if(!f) return null;
                return <span key={k} className="chip">{FIELD_ICON[k]||"·"} {f.unit?`${v} ${f.unit}`:v}</span>; })}
              {e.notes&&<span className="chip chip-note">✦ {e.notes}</span>}
            </div>
          )}
        </div>
      </div>
      <div className="card-actions">
        <button className="act-btn" onClick={()=>onEdit(e)}>Edit</button>
        {conf
          ?<><button className="act-btn danger" onClick={()=>onDel(e.id)}>Delete?</button>
              <button className="act-btn" onClick={()=>setConf(false)}>✕</button></>
          :<button className="act-btn" onClick={()=>setConf(true)}>✕</button>}
      </div>
    </div>
  );
}

/* ── CALENDAR ── */
function CalView({ acts,calDate,setCalDate,selDay,setSelDay,onExport,gcal,onLog,onEdit,onDel }) {
  const yr=calDate.getFullYear(), mo=calDate.getMonth();
  const first=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();
  const aMap={};
  acts.forEach(a=>{ if(!aMap[a.date]) aMap[a.date]=[]; aMap[a.date].push(a); });
  const cells=[...Array(first).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const dayActs=selDay?(aMap[selDay]||[]):[];
  return (
    <div className="cal-wrap">
      <div className="cal-box">
        <div className="cal-top">
          <button className="cal-arrow" onClick={()=>{setCalDate(new Date(yr,mo-1));setSelDay(null);}}>‹</button>
          <span className="cal-month">{MONTHS[mo]} {yr}</span>
          <button className="cal-arrow" onClick={()=>{setCalDate(new Date(yr,mo+1));setSelDay(null);}}>›</button>
        </div>
        <div className="cal-grid">
          {DAYS_S.map((d,i)=><div key={i} className="cal-dhead">{d}</div>)}
          {cells.map((d,i)=>{
            if(!d) return <div key={`e${i}`}/>;
            const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const da=aMap[ds]||[], isT=ds===todayStr(), isSel=ds===selDay;
            return (
              <button key={ds} className={`cal-cell${isT?" today":""}${isSel?" sel":""}${da.length?" has-act":""}`}
                onClick={()=>setSelDay(isSel?null:ds)}>
                <span className="cal-dnum">{d}</span>
                {da.length>0&&<div className="cal-dots">{da.slice(0,3).map(a=><span key={a.id} className="cal-dot" style={{background:getAct(a.type).accent}}/>)}</div>}
              </button>
            );
          })}
        </div>
        <div className="gcal-zone">
          <button className={`gcal-btn${gcal==="syncing"?" wait":""}${gcal==="done"?" ok":""}`} onClick={onExport}>
            {gcal==="syncing"?"Exporting…":gcal==="done"?"✓ Downloaded — import to Google Calendar":"↓ Sync with Google Calendar"}
          </button>
          {gcal==="done"&&<p className="gcal-note">Google Calendar → Settings → Import &amp; Export → Import <strong>analog.ics</strong></p>}
        </div>
      </div>
      {selDay&&(
        <div className="day-panel fade-up">
          <div className="day-panel-top">
            <span className="day-panel-date">{fmtDate(selDay)}</span>
            <button className="pill-btn sm" onClick={()=>onLog(selDay)}>+ Add</button>
          </div>
          {dayActs.length===0
            ?<p className="day-empty">Nothing here — add something?</p>
            :dayActs.map(e=><Card key={e.id} e={e} onEdit={onEdit} onDel={onDel}/>)}
        </div>
      )}
    </div>
  );
}

/* ── STATS ── */
function StatsView({ acts }) {
  const now=new Date(), yr=now.getFullYear();
  const thisM=`${yr}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const mActs=acts.filter(a=>a.date.startsWith(thisM));
  const yActs=acts.filter(a=>a.date.startsWith(String(yr)));
  const adM=new Set(mActs.map(a=>a.date)).size;
  const adY=new Set(yActs.map(a=>a.date)).size;
  const byMonth=Array.from({length:12},(_,i)=>({
    m:MONTHS_S[i],
    n:acts.filter(a=>a.date.startsWith(`${yr}-${String(i+1).padStart(2,"0")}`)).length,
  }));
  const tCount={};
  yActs.forEach(a=>{tCount[a.type]=(tCount[a.type]||0)+1;});
  const top=Object.entries(tCount).sort((a,b)=>b[1]-a[1]);
  const CTip=({active,payload,label})=>active&&payload?.length
    ?<div className="ctip"><strong>{label}</strong>: {payload[0].value}</div>:null;
  return (
    <div className="stats-wrap">
      <div className="stat-hero">
        <div className="stat-hero-card">
          <p className="stat-hero-num">{mActs.length}</p>
          <p className="stat-hero-label">activities this month</p>
          <p className="stat-hero-sub">{adM} active days</p>
        </div>
        <div className="stat-hero-card accent-card">
          <p className="stat-hero-num">{yActs.length}</p>
          <p className="stat-hero-label">activities in {yr}</p>
          <p className="stat-hero-sub">{adY} active days</p>
        </div>
      </div>
      {top[0]&&(
        <div className="fav-banner">
          <div className="fav-icon">{getAct(top[0][0]).icon}</div>
          <div><p className="fav-name">{getAct(top[0][0]).label}</p><p className="fav-sub">Your favourite · {top[0][1]} sessions this year</p></div>
          <div className="fav-badge">#1</div>
        </div>
      )}
      <div className="chart-box">
        <p className="chart-title">Activities per month</p>
        <ResponsiveContainer width="100%" height={160}>
          <BarChart data={byMonth} barSize={18} margin={{top:4,right:4,bottom:0,left:-28}}>
            <XAxis dataKey="m" tick={{fill:"#999",fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"#bbb",fontSize:10}} axisLine={false} tickLine={false} allowDecimals={false}/>
            <Tooltip content={<CTip/>} cursor={{fill:"rgba(232,228,74,.12)"}}/>
            <Bar dataKey="n" radius={[5,5,0,0]}>
              {byMonth.map((e,i)=><Cell key={i} fill={e.n>0?"#E8E44A":"#EEEBE0"}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      {top.length>0&&(
        <div className="chart-box">
          <p className="chart-title">By activity type</p>
          <div className="type-rows">
            {top.map(([type,cnt])=>{
              const a=getAct(type), pct=Math.round((cnt/yActs.length)*100);
              return (
                <div key={type} className="type-row">
                  <span className="type-ic">{a.icon}</span>
                  <span className="type-nm">{a.label}</span>
                  <div className="type-track"><div className="type-fill" style={{width:`${pct}%`,background:a.accent}}/></div>
                  <span className="type-cnt">{cnt}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── LOG MODAL ── */
function LogModal({ entry,onSave,onClose }) {
  const [form,setForm]=useState({
    id:entry?.id||null, type:entry?.type||"run", title:entry?.title||"",
    date:entry?.date||todayStr(), fields:entry?.fields||{}, notes:entry?.notes||"",
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setF=(k,v)=>setForm(f=>({...f,fields:{...f.fields,[k]:v}}));
  const act=getAct(form.type);
  const changeType=(id)=>setForm(f=>({...f,type:id,fields:{}}));
  return (
    <div className="overlay" onClick={e=>e.target.classList.contains("overlay")&&onClose()}>
      <div className="modal slide-up">
        <div className="modal-top">
          <span className="modal-heading">{form.id?"Edit activity":"Log activity"}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="act-pills">
          {ACTIVITIES.map(a=>(
            <button key={a.id} className={`act-pill${form.type===a.id?" sel":""}`}
              style={form.type===a.id?{background:a.accent,borderColor:a.accent,color:"#1A1A1A"}:{}}
              onClick={()=>changeType(a.id)}>{a.icon} {a.label}</button>
          ))}
        </div>
        <div className="act-indicator" style={{background:act.accent+"44",borderColor:act.accent+"66"}}>
          <span className="act-ind-icon">{act.icon}</span>
          <span className="act-ind-name">{act.label} selected</span>
        </div>
        <div className="form-row2">
          <div className="fgrp">
            <label className="flbl">Date</label>
            <input type="date" value={form.date} onChange={e=>set("date",e.target.value)} className="finput"/>
          </div>
          <div className="fgrp">
            <label className="flbl">Title <span className="fopt">optional</span></label>
            <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder={`e.g. Morning ${act.label}`} className="finput"/>
          </div>
        </div>
        {act.fields.length>0&&(
          <div className="form-row2">
            {act.fields.map(fk=>{ const f=FIELD_META[fk]; if(!f) return null;
              return (
                <div key={fk} className="fgrp">
                  <label className="flbl">{f.label} {f.unit&&<span className="funit">{f.unit}</span>} <span className="fopt">optional</span></label>
                  <input type={f.type} value={form.fields[fk]||""} onChange={e=>setF(fk,e.target.value)} placeholder={f.ph} className="finput"/>
                </div>
              ); })}
          </div>
        )}
        <div className="fgrp">
          <label className="flbl">Notes <span className="fopt">optional</span></label>
          <textarea value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="How was it?" className="finput fta"/>
        </div>
        <button className="save-btn" style={{background:act.accent}} onClick={()=>form.date&&onSave(form)}>
          {form.id?"Save changes":`Log ${act.label}`} →
        </button>
      </div>
    </div>
  );
}

.l-act-card-name{font-size:12px;font-weight:600;color:var(--txt);letter-spacing:-.01em;}
.l-cta{padding:6rem 1.5rem;text-align:center;position:relative;overflow:hidden;}
.l-cta-inner{max-width:540px;margin:0 auto;position:relative;z-index:2;}
.l-cta-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:conic-gradient(from 0deg,#E8E44A 0deg,#C8F5A0 90deg,#C8B8F0 180deg,#F5CDF0 270deg,#E8E44A 360deg);filter:blur(80px);opacity:.35;pointer-events:none;}
.l-cta-h{font-size:clamp(36px,6vw,60px);font-weight:900;letter-spacing:-.05em;line-height:1.05;margin-bottom:1rem;}
.l-cta-sub{color:var(--txt2);font-size:16px;margin-bottom:2rem;}
.l-footer{border-top:1px solid var(--bdr);padding:2.5rem 1.5rem;text-align:center;}
.l-footer-inner{max-width:1040px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:.6rem;}
.l-footer-logo{display:flex;align-items:center;gap:.4rem;}
.l-footer-copy{font-size:14px;color:var(--txt2);}
.l-footer-tiny{font-size:12px;color:var(--txt3);}
.fade-up{animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .32s cubic-bezier(.16,1,.3,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--cream);}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
input[type=date]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;}
input[type=number]::-webkit-inner-spin-button{opacity:.3;}
